<script>
let words = [];
let dict = JSON.parse(localStorage.getItem("dict") || "{}");

async function loadWords(){
    const res = await fetch("words.json");
    words = await res.json();
    render();
}

function saveDict(){
    localStorage.setItem("dict", JSON.stringify(dict));
}

function getMeaning(w){
    return dict[w] || "（点击添加释义）";
}

function speak(t){
    const u = new SpeechSynthesisUtterance(t);
    u.lang = "en-US";
    speechSynthesis.speak(u);
}

function render(){
    const q = document.getElementById("search").value?.toLowerCase() || "";
    const list = document.getElementById("list");

    list.innerHTML = "";

    words
    .filter(w => w.toLowerCase().includes(q))
    .forEach(w => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="word">${w}</div>
            <div class="meaning">${getMeaning(w)}</div>
            <button onclick="speak('${w}')">🔊</button>
        `;

        list.appendChild(div);
    });
}

loadWords();
</script>
